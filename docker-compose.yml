services:

  # ── Base de datos — data-hub (Spring Boot) ─────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-datahub}
      POSTGRES_USER:     ${POSTGRES_USER:-datahub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expuesto solo para dev; quitar en prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datahub_user} -d ${POSTGRES_DB:-datahub}"]
      interval: 10s
      retries: 5
      start_period: 20s

  # ── Base de datos — erp-sync (microservicio Node.js) ───────────
  erp-sync-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${ERP_SYNC_DB_NAME:-erpsync}
      POSTGRES_USER:     ${ERP_SYNC_DB_USER:-erpsync_user}
      POSTGRES_PASSWORD: ${ERP_SYNC_DB_PASSWORD:-changeme_erpsync_db}
    volumes:
      - erp_sync_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"          # puerto diferente al de data-hub; quitar en prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ERP_SYNC_DB_USER:-erpsync_user} -d ${ERP_SYNC_DB_NAME:-erpsync}"]
      interval: 10s
      retries: 5
      start_period: 20s

  # ── Backend Spring Boot ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL:                               jdbc:postgresql://db:${DB_PORT:-5432}/${DB_NAME:-datahub}
      SPRING_DATASOURCE_USERNAME:                          ${DB_USERNAME:-datahub_user}
      SPRING_DATASOURCE_PASSWORD:                          ${DB_PASSWORD:-changeme_db}
      SPRING_PROFILES_ACTIVE:                              ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET:                                          ${JWT_SECRET:-default_secret_only_for_local_dev_change_in_prod}
      JWT_EXPIRATION_MS:                                   ${JWT_EXPIRATION_MS:-3600000}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:              ${MAX_FILE_SIZE:-50MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:           ${MAX_REQUEST_SIZE:-52MB}
      FILES_STORAGE_PATH:                                  ${FILES_STORAGE_PATH:-/app/files}
      JOB_SCHEDULER_FIXED_DELAY_MS:                        ${JOB_SCHEDULER_FIXED_DELAY_MS:-5000}
      JOB_ORPHAN_TIMEOUT_MINUTES:                          ${JOB_ORPHAN_TIMEOUT_MINUTES:-10}
      RATE_LIMIT_REQUESTS_PER_MINUTE:                      ${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - files_data:${FILES_STORAGE_PATH:-/app/files}
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend Vite + React ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app            # hot reload en dev
      - /app/node_modules          # evitar que el bind-mount pise node_modules

  # ── ERP Sync (Node.js microservicio) ──────────────────────────
  erp-sync:
    build:
      context: ./erp-sync
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ERP_SYNC_DB_HOST:     erp-sync-db
      ERP_SYNC_DB_PORT:     5432
      ERP_SYNC_DB_NAME:     ${ERP_SYNC_DB_NAME:-erpsync}
      ERP_SYNC_DB_USER:     ${ERP_SYNC_DB_USER:-erpsync_user}
      ERP_SYNC_DB_PASSWORD: ${ERP_SYNC_DB_PASSWORD:-changeme_erpsync_db}
      ERP_SYNC_DB_POOL_MAX: ${ERP_SYNC_DB_POOL_MAX:-10}
      ERP_SYNC_PORT:        ${ERP_SYNC_PORT:-3001}
      NODE_ENV:             ${NODE_ENV:-production}
      CORS_ORIGIN:          ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${ERP_SYNC_PORT:-3001}:3001"
    depends_on:
      erp-sync-db:
        condition: service_healthy

volumes:
  db_data:
  erp_sync_db_data:
  files_data:
